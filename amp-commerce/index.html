<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMP Commerce</title>
  <script src="https://cdn.amplitude.com/script/c9d6c776f682045c5a2456782659cb49.js"></script>
  <script>
    window.amplitude.init('c9d6c776f682045c5a2456782659cb49', {
      fetchRemoteConfig: true,
      autocapture: {
        sessions: true,
        pageViews: false,
        formInteractions: false,
        fileDownloads: false,
        attribution: false,
      },
    });
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {}
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .banner-slide { display: none; position: absolute; inset: 0; }
    .banner-slide.active { display: block; }
    .banner-fade { animation: fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .product-card:hover .product-img { transform: scale(1.05); }
    .product-img { transition: transform 0.3s ease; }
  </style>
</head>
<body class="min-h-screen bg-gray-50">

  <!-- 검색 헤더 -->
  <header class="bg-white border-b sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex items-center gap-4">
        <!-- 브랜드 로고 -->
        <div class="flex items-center flex-shrink-0">
          <img
            src="https://images.unsplash.com/photo-1760386129108-d17b9cdfc4fa?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=80"
            alt="브랜드 로고"
            class="h-10 w-10 object-cover rounded-lg"
          />
        </div>

        <!-- 검색창 -->
        <div class="flex-1 flex items-center gap-2 bg-gray-50 rounded-lg px-4 py-2 border border-gray-200">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input
            type="text"
            placeholder="검색어를 입력하세요"
            class="flex-1 border-0 bg-transparent focus:outline-none text-sm text-gray-700 placeholder-gray-400"
          />
        </div>

        <!-- 검색 버튼 -->
        <button class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-md text-sm font-medium transition-colors flex-shrink-0">
          검색
        </button>
      </div>
    </div>
  </header>

  <!-- 카테고리 아이콘 -->
  <section class="bg-white py-6 border-b">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex items-center justify-between overflow-x-auto gap-4 pb-2">

        <!-- 패션 -->
        <button class="flex flex-col items-center gap-2 min-w-[80px] hover:opacity-70 transition-opacity">
          <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6.5 2h11L21 7l-3 2v11a1 1 0 01-1 1H7a1 1 0 01-1-1V9L3 7l3.5-5z"/>
            </svg>
          </div>
          <span class="text-sm text-gray-700">패션</span>
        </button>

        <!-- 전자기기 -->
        <button class="flex flex-col items-center gap-2 min-w-[80px] hover:opacity-70 transition-opacity">
          <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
              <line x1="12" y1="18" x2="12.01" y2="18"/>
            </svg>
          </div>
          <span class="text-sm text-gray-700">전자기기</span>
        </button>

        <!-- 홈&리빙 -->
        <button class="flex flex-col items-center gap-2 min-w-[80px] hover:opacity-70 transition-opacity">
          <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 21V12h6v9"/>
            </svg>
          </div>
          <span class="text-sm text-gray-700">홈&amp;리빙</span>
        </button>

        <!-- 게임 -->
        <button class="flex flex-col items-center gap-2 min-w-[80px] hover:opacity-70 transition-opacity">
          <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <rect x="2" y="6" width="20" height="12" rx="2"/>
              <path d="M6 12h4M8 10v4M15 11h.01M17 13h.01"/>
            </svg>
          </div>
          <span class="text-sm text-gray-700">게임</span>
        </button>

        <!-- 도서 -->
        <button class="flex flex-col items-center gap-2 min-w-[80px] hover:opacity-70 transition-opacity">
          <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
            </svg>
          </div>
          <span class="text-sm text-gray-700">도서</span>
        </button>

        <!-- 식품 -->
        <button class="flex flex-col items-center gap-2 min-w-[80px] hover:opacity-70 transition-opacity">
          <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 11l19-9-9 19-2-8-8-2z"/>
            </svg>
          </div>
          <span class="text-sm text-gray-700">식품</span>
        </button>

        <!-- 쇼핑 -->
        <button class="flex flex-col items-center gap-2 min-w-[80px] hover:opacity-70 transition-opacity">
          <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <path d="M16 10a4 4 0 01-8 0"/>
            </svg>
          </div>
          <span class="text-sm text-gray-700">쇼핑</span>
        </button>

        <!-- 위시리스트 -->
        <button class="flex flex-col items-center gap-2 min-w-[80px] hover:opacity-70 transition-opacity">
          <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
            </svg>
          </div>
          <span class="text-sm text-gray-700">위시리스트</span>
        </button>

      </div>
    </div>
  </section>

  <!-- 프로모션 배너 -->
  <section class="bg-gray-50 py-6">
    <div class="max-w-7xl mx-auto px-4">
      <div class="relative h-72 md:h-96 rounded-2xl overflow-hidden" id="bannerContainer">

        <!-- 배너 슬라이드 1 -->
        <div class="banner-slide active banner-fade" id="slide-0">
          <img
            src="https://images.unsplash.com/photo-1726979097641-4ed5ba18021c?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=1080"
            alt="패션 특별 할인"
            class="w-full h-full object-cover"
          />
          <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end">
            <div class="p-8">
              <h2 class="text-white text-3xl md:text-4xl font-light">패션 특별 할인</h2>
            </div>
          </div>
        </div>

        <!-- 배너 슬라이드 2 -->
        <div class="banner-slide" id="slide-1">
          <img
            src="https://images.unsplash.com/photo-1676975320111-0837c5296aad?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=1080"
            alt="시즌 세일"
            class="w-full h-full object-cover"
          />
          <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end">
            <div class="p-8">
              <h2 class="text-white text-3xl md:text-4xl font-light">시즌 세일</h2>
            </div>
          </div>
        </div>

        <!-- 배너 슬라이드 3 -->
        <div class="banner-slide" id="slide-2">
          <img
            src="https://images.unsplash.com/photo-1761884594876-2a6721170ff7?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=1080"
            alt="신상품 출시"
            class="w-full h-full object-cover"
          />
          <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end">
            <div class="p-8">
              <h2 class="text-white text-3xl md:text-4xl font-light">신상품 출시</h2>
            </div>
          </div>
        </div>

        <!-- 이전 버튼 -->
        <button
          onclick="changeBanner(-1)"
          class="absolute left-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-white/80 hover:bg-white rounded-full flex items-center justify-center transition-colors"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>

        <!-- 다음 버튼 -->
        <button
          onclick="changeBanner(1)"
          class="absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-white/80 hover:bg-white rounded-full flex items-center justify-center transition-colors"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>

        <!-- 인디케이터 -->
        <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2" id="indicators">
          <button onclick="goToSlide(0)" class="h-2 rounded-full transition-all w-8 bg-white" id="dot-0"></button>
          <button onclick="goToSlide(1)" class="h-2 rounded-full transition-all w-2 bg-white/50" id="dot-1"></button>
          <button onclick="goToSlide(2)" class="h-2 rounded-full transition-all w-2 bg-white/50" id="dot-2"></button>
        </div>

      </div>
    </div>
  </section>

  <!-- 오늘의 하이라이트 -->
  <section class="bg-white py-8">
    <div class="max-w-7xl mx-auto px-4">
      <h2 class="text-2xl mb-6 font-light">오늘의 하이라이트</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">

        <div class="product-card group cursor-pointer">
          <div class="relative aspect-square rounded-xl overflow-hidden mb-3">
            <img
              src="https://images.unsplash.com/photo-1696452941955-0708c9ede972?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=400"
              alt="프리미엄 컬렉션"
              class="product-img w-full h-full object-cover"
            />
            <div class="absolute inset-0 bg-black/0 hover:bg-black/10 transition-colors duration-300"></div>
          </div>
          <h3 class="text-center text-sm text-gray-800">프리미엄 컬렉션</h3>
        </div>

        <div class="product-card group cursor-pointer">
          <div class="relative aspect-square rounded-xl overflow-hidden mb-3">
            <img
              src="https://images.unsplash.com/photo-1717996563514-e3519f9ef9f7?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=400"
              alt="최신 전자기기"
              class="product-img w-full h-full object-cover"
            />
            <div class="absolute inset-0 bg-black/0 hover:bg-black/10 transition-colors duration-300"></div>
          </div>
          <h3 class="text-center text-sm text-gray-800">최신 전자기기</h3>
        </div>

        <div class="product-card group cursor-pointer">
          <div class="relative aspect-square rounded-xl overflow-hidden mb-3">
            <img
              src="https://images.unsplash.com/photo-1769240171986-d4ba22cf3154?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=400"
              alt="라이프스타일 악세서리"
              class="product-img w-full h-full object-cover"
            />
            <div class="absolute inset-0 bg-black/0 hover:bg-black/10 transition-colors duration-300"></div>
          </div>
          <h3 class="text-center text-sm text-gray-800">라이프스타일 악세서리</h3>
        </div>

        <div class="product-card group cursor-pointer">
          <div class="relative aspect-square rounded-xl overflow-hidden mb-3">
            <img
              src="https://images.unsplash.com/photo-1707376519357-b53e370384fe?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=400"
              alt="홈 데코 인테리어"
              class="product-img w-full h-full object-cover"
            />
            <div class="absolute inset-0 bg-black/0 hover:bg-black/10 transition-colors duration-300"></div>
          </div>
          <h3 class="text-center text-sm text-gray-800">홈 데코 인테리어</h3>
        </div>

      </div>
    </div>
  </section>

  <script>
    let currentSlide = 0;
    const totalSlides = 3;

    function goToSlide(index) {
      // 현재 슬라이드 숨기기
      document.getElementById('slide-' + currentSlide).classList.remove('active', 'banner-fade');
      document.getElementById('dot-' + currentSlide).className = 'h-2 rounded-full transition-all w-2 bg-white/50';

      currentSlide = (index + totalSlides) % totalSlides;

      // 새 슬라이드 보이기
      const newSlide = document.getElementById('slide-' + currentSlide);
      newSlide.classList.add('active', 'banner-fade');
      document.getElementById('dot-' + currentSlide).className = 'h-2 rounded-full transition-all w-8 bg-white';
    }

    function changeBanner(direction) {
      goToSlide(currentSlide + direction);
    }

    // 3초마다 자동 슬라이드
    setInterval(() => changeBanner(1), 3000);

    // 상품 카드 호버 효과
    document.querySelectorAll('.product-card').forEach(card => {
      const img = card.querySelector('.product-img');
      card.addEventListener('mouseenter', () => img.style.transform = 'scale(1.05)');
      card.addEventListener('mouseleave', () => img.style.transform = 'scale(1)');
    });
  </script>

</body>
</html>
